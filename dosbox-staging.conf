[debugtrace]
enabled = true
logfile = game_trace.log
trace_instructions = true
trace_interrupts = true
trace_file_io = true
trace_video_modes = true
auto_trace_on_exec = true
trace_on_interactive_exec_only = true
exclude_interrupts = 08,1C
file_read_hex_dump_bytes = 64
instruction_sample_rate = 1
max_log_size_mb = 0
binary_opcode_dump = true   
binary_opcode_file = opcodes.bin
;deduplicate_interrupts = true
;dedup_interrupt_window_ms = 50
;deduplicate_instructions = true
;dedup_instruction_max_consecutive = 3
binary_opcode_dump_game_only = true

; VRAM / text-buffer dumps (mode track + configurable hotkey)
; Hotkey format: ctrl+f10, ctrl+alt+f12, f12, none  — NOT ctrl+f9 (Shutdown)
screen_dump = true
screen_dump_dir = screen_dumps
screen_dump_on_mode_set = true
screen_dump_on_mode_set_delay_ms = 50
screen_dump_full_16k = false
screen_dump_write_meta = true
screen_dump_hotkey = ctrl+f10

; Guest DS/phys memory dumps (ICON stamps @207A, MAP @31D4, offscr ptr @206C)
; Hotkey: ctrl+f11 (default). Empty mem_dump_regions = ICON defaults.
mem_dump = true
mem_dump_dir = mem_dumps
mem_dump_write_meta = true
mem_dump_hotkey = ctrl+f11
; mem_dump_regions = stamps@ds:207A+1200,map@ds:31D4+0F00,offscr@ds:206C->near+2000
